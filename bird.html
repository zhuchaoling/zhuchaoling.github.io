<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <!-- 禁用移动端缩放与双击放大的 viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>愤怒的小鸟 - 全平台兼容版 (PC & Mobile)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <style>
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      user-select: none; 
      -webkit-user-select: none; 
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1c23;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      touch-action: none; /* 禁用移动端默认触摸滚动/缩放 */
    }
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    .hud {
      position: absolute;
      top: 12px; left: 16px;
      font-size: 16px; font-weight: 900;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      color: #ffd32a;
      pointer-events: none;
      z-index: 10;
      display: flex;
      gap: 20px;
    }
    .controls-tip {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      font-weight: normal;
      display: none; /* PC端显示快捷键提示 */
    }
    @media (min-width: 769px) {
      .controls-tip { display: inline-block; }
    }
    .reset-btn {
      position: absolute;
      top: 10px; right: 16px;
      padding: 8px 18px;
      background: linear-gradient(45deg, #ff4757, #ff6b81);
      border: none; border-radius: 20px;
      color: #fff; font-weight: bold; font-size: 14px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(255,71,87,0.4);
      z-index: 10;
      transition: transform 0.1s ease, background 0.2s;
    }
    .reset-btn:hover { background: linear-gradient(45deg, #ff6b81, #ff4757); }
    .reset-btn:active { transform: scale(0.92); }

    /* 📱 仅在小屏竖屏（移动端）时显示的横屏提示蒙层 */
    #orient-overlay {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: #121319;
      z-index: 999;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    #orient-overlay .icon {
      font-size: 48px;
      margin-bottom: 15px;
      animation: rotateAnim 2s infinite ease-in-out;
    }
    @keyframes rotateAnim {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(90deg); }
    }
    /* 仅在屏幕宽度较小且为竖屏（高度 > 宽度）时触发提示 */
    @media screen and (orientation: portrait) and (max-width: 768px) {
      #orient-overlay { display: flex; }
    }

    /* 🏆 通关 & 失败 弹窗 */
    .modal {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .modal.show {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-card {
      background: #2f3542;
      border: 3px solid #ffa502;
      border-radius: 16px;
      padding: 24px 36px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transform: scale(0.8);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      max-width: 90%;
      width: 380px;
    }
    .modal.show .modal-card { transform: scale(1); }
    .modal-title { font-size: 24px; font-weight: 900; color: #2ed573; margin-bottom: 10px; }
    .modal-title.fail { color: #ff4757; }
    .modal-desc { font-size: 14px; color: #dfe4ea; margin-bottom: 20px; line-height: 1.5; }
    .modal-btn {
      padding: 10px 24px;
      font-size: 15px; font-weight: bold; color: #fff;
      background: #2ed573; border: none; border-radius: 25px;
      cursor: pointer; box-shadow: 0 4px 15px rgba(46, 213, 115, 0.4);
      transition: transform 0.1s ease, background 0.2s;
    }
    .modal-btn:hover { background: #26af5f; }
    .modal-btn:active { transform: scale(0.95); }
  </style>
</head>
<body>

  <!-- 竖屏强制旋转提示（仅在移动端竖屏显示） -->
  <div id="orient-overlay">
    <div class="icon">📱</div>
    <h2>请旋转手机以横屏游玩</h2>
    <p style="color:#aaa; font-size:13px; margin-top:8px;">体验更广阔的视野与操作手感</p>
  </div>

  <div id="game-container">
    <div class="hud">
      <div>关卡: <span id="level-num">1</span>/10</div>
      <div>得分: <span id="score">0</span></div>
      <div>剩余小鸟: <span id="birds-left">3</span></div>
      <div class="controls-tip">(快捷键: [R]重置 [Space]继续)</div>
    </div>
    <button class="reset-btn" onclick="resetCurrentLevel()">重置 (R)</button>

    <!-- 弹窗 -->
    <div id="modal" class="modal">
      <div class="modal-card">
        <div id="modal-title" class="modal-title">关卡完成！</div>
        <div id="modal-desc" class="modal-desc">成功歼灭了所有绿猪！</div>
        <button id="modal-btn" class="modal-btn" onclick="handleModalClick()">进入下一关</button>
      </div>
    </div>
  </div>

<script>
const { Engine, Render, Runner, Bodies, Composite, Constraint, Mouse, MouseConstraint, Events, Vector } = Matter;

let width = window.innerWidth;
let height = window.innerHeight;
let slingPos = { x: width * 0.18, y: height * 0.68 };

let engine, render, runner, bird, slingshot, mouseConstraint;
let currentLevel = 1;
let score = 0;
let birdsLeft = 3;
let isFired = false;
let gameStartTime = 0;
let levelCleared = false;

// 判断是否为移动端
const isMobileDevice = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

// 初始化/清理游戏画布与引擎
function initGame() {
  const container = document.getElementById('game-container');

  // 更新当前窗口尺寸
  width = window.innerWidth;
  height = window.innerHeight;
  // 计算弹性锚点，根据宽高比做自适应调整
  slingPos = { 
    x: Math.max(120, width * 0.18), 
    y: Math.min(height - 120, height * 0.68) 
  };

  if (render) {
    Render.stop(render);
    Runner.stop(runner);
    Composite.clear(engine.world);
    Engine.clear(engine);
    if (render.canvas) render.canvas.remove();
  }

  gameStartTime = Date.now();
  isFired = false;
  levelCleared = false;
  birdsLeft = 3;

  updateHUD();

  engine = Engine.create();
  
  render = Render.create({
    element: container,
    engine: engine,
    options: {
      width: width,
      height: height,
      wireframes: false,
      background: '#87CEEB'
    }
  });

  Render.run(render);
  runner = Runner.create();
  Runner.run(runner, engine);

  // 边界设置：保持顶部开放，底和两侧封闭
  const groundHeight = 30;
  const ground = Bodies.rectangle(width / 2, height - groundHeight / 2, width * 2, groundHeight, { 
    isStatic: true, 
    render: { fillStyle: '#4bc02d' } 
  });
  const leftWall = Bodies.rectangle(-20, height / 2, 40, height * 4, { isStatic: true });
  const rightWall = Bodies.rectangle(width + 20, height / 2, 40, height * 4, { isStatic: true });
  Composite.add(engine.world, [ground, leftWall, rightWall]);

  // 加载地图与角色
  loadLevel(currentLevel);
  spawnBird();

  // 鼠标/移动端触摸交互
  const mouse = Mouse.create(render.canvas);
  
  // 如果是 PC 端，允许在 Canvas 外释放鼠标
  if (!isMobileDevice) {
    mouse.element.removeEventListener("mousewheel", mouse.mousewheel);
    mouse.element.removeEventListener("DOMMouseScroll", mouse.mousewheel);
  }

  mouseConstraint = MouseConstraint.create(engine, {
    mouse: mouse,
    constraint: { 
      stiffness: 0.2, 
      render: { visible: false } 
    }
  });
  Composite.add(engine.world, mouseConstraint);
  render.mouse = mouse;

  // 松手/抬笔事件
  Events.on(mouseConstraint, 'enddrag', (e) => {
    if (e.body === bird) isFired = true;
  });

  // 物理更新逻辑
  Events.on(engine, 'afterUpdate', () => {
    if (isFired && bird && bird.position.x > slingPos.x + 10) {
      slingshot.bodyB = null;
      slingshot.render.visible = false;
    }

    if (isFired && bird) {
      const isSlow = Vector.magnitude(bird.velocity) < 0.25;
      const isOutOfBounds = bird.position.x > width + 100 || bird.position.x < -100 || bird.position.y > height + 100;

      if (isSlow || isOutOfBounds) {
        Composite.remove(engine.world, bird);
        bird = null;
        birdsLeft--;
        updateHUD();

        if (birdsLeft > 0 && !levelCleared && getRemainingPigsCount() > 0) {
          setTimeout(() => { spawnBird(); }, 400);
        } else {
          checkGameStatus();
        }
      }
    }
  });

  // 碰撞事件
  Events.on(engine, 'collisionStart', (event) => {
    if (Date.now() - gameStartTime < 800) return;

    event.pairs.forEach((pair) => {
      const { bodyA, bodyB } = pair;
      const checkPigHit = (target) => {
        if (target.label === 'pig') {
          const speed = Vector.magnitude(Vector.sub(bodyA.velocity, bodyB.velocity));
          if (speed > 2.5) {
            Composite.remove(engine.world, target);
            score += 200;
            updateHUD();
            setTimeout(checkGameStatus, 200);
          }
        }
      };
      checkPigHit(bodyA);
      checkPigHit(bodyB);
    });
  });

  // 自定义 Canvas 绘制（轨迹、小鸟、绿猪）
  Events.on(render, 'afterRender', () => {
    const ctx = render.context;

    if (!isFired && bird && mouseConstraint.body === bird) {
      drawTrajectory(ctx);
    }

    const bodies = Composite.allBodies(engine.world);
    bodies.forEach(body => {
      if (body.label === 'pig') drawPig(ctx, body);
      else if (body.label === 'bird') drawBird(ctx, body);
    });
  });
}

function spawnBird() {
  // 根据屏幕尺寸等比例调整小鸟尺寸，保证在 PC 和移动端上比例视觉舒适
  const birdRadius = Math.max(12, Math.min(18, width * 0.015));
  
  bird = Bodies.circle(slingPos.x, slingPos.y, birdRadius, {
    density: 0.004,
    frictionAir: 0.005,
    label: 'bird',
    render: { visible: false }
  });

  slingshot = Constraint.create({
    pointA: slingPos,
    bodyB: bird,
    stiffness: 0.05,
    damping: 0.01,
    render: { strokeStyle: '#5d4037', lineWidth: 6 }
  });

  Composite.add(engine.world, [bird, slingshot]);
  isFired = false;
}

function getRemainingPigsCount() {
  return Composite.allBodies(engine.world).filter(b => b.label === 'pig').length;
}

function checkGameStatus() {
  if (levelCleared) return;
  const pigsLeft = getRemainingPigsCount();

  if (pigsLeft === 0) {
    levelCleared = true;
    showModal(true);
  } else if (birdsLeft === 0 && (!bird || isFired)) {
    showModal(false);
  }
}

// 🗺️ 针对不同分辨率大屏/小屏自适应计算的的 10 个关卡地图
function loadLevel(level) {
  const wood = '#a67c52';
  const stone = '#7f8c8d';

  const createWood = (x, y, w, h) => Bodies.rectangle(x, y, w, h, { label: 'wood', render: { fillStyle: wood } });
  const createStone = (x, y, w, h) => Bodies.rectangle(x, y, w, h, { label: 'stone', render: { fillStyle: stone } });
  
  // 猪的半径根据分辨率做适配
  const defaultPigR = Math.max(12, Math.min(16, width * 0.014));
  const createPig = (x, y, r = defaultPigR) => Bodies.circle(x, y, r, { label: 'pig', render: { visible: false } });

  const items = [];
  const baseX = Math.max(width * 0.65, width - 350); // 计算城堡基准位置
  const baseY = height - 30; // 统一相对地面锚定

  if (level === 1) {
    items.push(createWood(baseX - 40, baseY - 35, 16, 70), createWood(baseX + 40, baseY - 35, 16, 70));
    items.push(createWood(baseX, baseY - 75, 110, 14));
    items.push(createPig(baseX, baseY - 20));
    items.push(createPig(baseX, baseY - 95));

  } else if (level === 2) {
    items.push(createWood(baseX - 80, baseY - 40, 16, 80), createWood(baseX - 10, baseY - 40, 16, 80));
    items.push(createWood(baseX - 45, baseY - 85, 90, 14));
    items.push(createPig(baseX - 45, baseY - 20));

    items.push(createWood(baseX + 60, baseY - 50, 16, 100), createWood(baseX + 130, baseY - 50, 16, 100));
    items.push(createWood(baseX + 95, baseY - 105, 90, 14));
    items.push(createPig(baseX + 95, baseY - 20), createPig(baseX + 95, baseY - 125));

  } else if (level === 3) {
    items.push(createStone(baseX - 60, baseY - 45, 20, 90), createStone(baseX + 60, baseY - 45, 20, 90));
    items.push(createWood(baseX, baseY - 95, 150, 16));
    items.push(createPig(baseX - 30, baseY - 20), createPig(baseX + 30, baseY - 20));

    items.push(createWood(baseX - 30, baseY - 135, 16, 60), createWood(baseX + 30, baseY - 135, 16, 60));
    items.push(createWood(baseX, baseY - 170, 90, 14));
    items.push(createPig(baseX, baseY - 190));

  } else if (level === 4) {
    items.push(createStone(baseX - 130, baseY - 40, 24, 80));
    items.push(createWood(baseX - 40, baseY - 40, 16, 80), createWood(baseX + 40, baseY - 40, 16, 80));
    items.push(createWood(baseX, baseY - 85, 110, 14));
    items.push(createPig(baseX, baseY - 20));

    items.push(createStone(baseX, baseY - 130, 20, 80));
    items.push(createPig(baseX, baseY - 180));

  } else if (level === 5) {
    items.push(createStone(baseX - 40, baseY - 50, 20, 100), createStone(baseX + 40, baseY - 50, 20, 100));
    items.push(createWood(baseX, baseY - 105, 110, 16));
    items.push(createPig(baseX, baseY - 20));

    items.push(createStone(baseX - 30, baseY - 150, 18, 80), createStone(baseX + 30, baseY - 150, 18, 80));
    items.push(createWood(baseX, baseY - 195, 90, 14));
    items.push(createPig(baseX, baseY - 215));

    items.push(createWood(baseX, baseY - 240, 14, 70));
    items.push(createPig(baseX, baseY - 285));

  } else if (level === 6) {
    items.push(createWood(baseX - 80, baseY - 35, 16, 70), createWood(baseX, baseY - 35, 16, 70), createWood(baseX + 80, baseY - 35, 16, 70));
    items.push(createStone(baseX, baseY - 75, 190, 16));
    items.push(createPig(baseX - 40, baseY - 20), createPig(baseX + 40, baseY - 20));

    items.push(createWood(baseX - 40, baseY - 115, 16, 70), createWood(baseX + 40, baseY - 115, 16, 70));
    items.push(createWood(baseX, baseY - 155, 110, 14));
    items.push(createPig(baseX, baseY - 175));

  } else if (level === 7) {
    items.push(createStone(baseX - 80, baseY - 45, 20, 90), createStone(baseX, baseY - 45, 20, 90), createStone(baseX + 80, baseY - 45, 20, 90));
    items.push(createWood(baseX, baseY - 95, 200, 16));
    items.push(createPig(baseX - 40, baseY - 20), createPig(baseX + 40, baseY - 20));

    items.push(createStone(baseX - 40, baseY - 145, 20, 90), createStone(baseX + 40, baseY - 145, 20, 90));
    items.push(createWood(baseX, baseY - 195, 120, 16));
    items.push(createPig(baseX, baseY - 120), createPig(baseX, baseY - 215));

  } else if (level === 8) {
    items.push(createWood(baseX - 120, baseY - 40, 16, 80), createWood(baseX - 60, baseY - 40, 16, 80));
    items.push(createWood(baseX - 90, baseY - 85, 80, 14));
    items.push(createPig(baseX - 90, baseY - 20));

    items.push(createStone(baseX - 10, baseY - 50, 20, 100), createStone(baseX + 50, baseY - 50, 20, 100));
    items.push(createWood(baseX + 20, baseY - 105, 90, 14));
    items.push(createPig(baseX + 20, baseY - 20), createPig(baseX + 20, baseY - 125));

    items.push(createWood(baseX + 100, baseY - 40, 16, 80), createWood(baseX + 160, baseY - 40, 16, 80));
    items.push(createWood(baseX + 130, baseY - 85, 80, 14));
    items.push(createPig(baseX + 130, baseY - 20));

  } else if (level === 9) {
    items.push(createWood(baseX - 120, baseY - 35, 16, 70), createWood(baseX - 40, baseY - 35, 16, 70), createWood(baseX + 40, baseY - 35, 16, 70), createWood(baseX + 120, baseY - 35, 16, 70));
    items.push(createStone(baseX, baseY - 75, 270, 16));
    items.push(createPig(baseX - 80, baseY - 20), createPig(baseX, baseY - 20), createPig(baseX + 80, baseY - 20));

    items.push(createWood(baseX - 80, baseY - 115, 16, 70), createWood(baseX, baseY - 115, 16, 70), createWood(baseX + 80, baseY - 115, 16, 70));
    items.push(createStone(baseX, baseY - 155, 190, 16));
    items.push(createPig(baseX - 40, baseY - 100), createPig(baseX + 40, baseY - 100));

    items.push(createWood(baseX - 40, baseY - 195, 16, 70), createWood(baseX + 40, baseY - 195, 16, 70));
    items.push(createWood(baseX, baseY - 235, 110, 14));
    items.push(createPig(baseX, baseY - 255));

  } else if (level === 10) {
    items.push(createStone(baseX - 120, baseY - 50, 25, 100), createStone(baseX - 40, baseY - 50, 25, 100), createStone(baseX + 40, baseY - 50, 25, 100), createStone(baseX + 120, baseY - 50, 25, 100));
    items.push(createWood(baseX, baseY - 105, 280, 18));
    items.push(createPig(baseX - 80, baseY - 20, 14), createPig(baseX, baseY - 20, 18), createPig(baseX + 80, baseY - 20, 14));

    items.push(createStone(baseX - 80, baseY - 160, 20, 100), createStone(baseX + 80, baseY - 160, 20, 100));
    items.push(createWood(baseX, baseY - 215, 190, 16));
    items.push(createPig(baseX, baseY - 130, 15));

    items.push(createWood(baseX - 40, baseY - 260, 16, 80), createWood(baseX + 40, baseY - 260, 16, 80));
    items.push(createStone(baseX, baseY - 305, 110, 16));
    items.push(createPig(baseX, baseY - 325, 14));
  }

  Composite.add(engine.world, items);
}

// 🎯 绘制预瞄轨迹
function drawTrajectory(ctx) {
  const forceX = (slingPos.x - bird.position.x) * 0.13;
  const forceY = (slingPos.y - bird.position.y) * 0.13;
  
  let vx = (forceX / bird.density) * 0.0004; 
  let vy = (forceY / bird.density) * 0.0004;

  let currX = bird.position.x;
  let currY = bird.position.y;
  const gravity = engine.world.gravity.y * engine.world.gravity.scale;

  ctx.save();
  ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';

  for (let i = 0; i < 28; i++) {
    currX += vx;
    currY += vy;
    vy += gravity * 16;

    if (i % 2 === 0) {
      const radius = Math.max(1.5, 4 - i * 0.1);
      ctx.beginPath();
      ctx.arc(currX, currY, radius, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();
}

// 🐷 绘制绿猪
function drawPig(ctx, body) {
  const { x, y } = body.position;
  const r = body.circleRadius;
  const angle = body.angle;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  ctx.fillStyle = '#27ae60';
  ctx.beginPath(); ctx.arc(-r * 0.7, -r * 0.7, r * 0.35, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.7, -r * 0.7, r * 0.35, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = '#2ecc71';
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#27ae60'; ctx.lineWidth = 2; ctx.stroke();

  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-r * 0.35, -r * 0.2, r * 0.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.35, -r * 0.2, r * 0.3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(-r * 0.3, -r * 0.2, r * 0.12, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.4, -r * 0.2, r * 0.12, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = '#27ae60';
  ctx.beginPath(); ctx.ellipse(0, r * 0.15, r * 0.45, r * 0.3, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1e8449';
  ctx.beginPath(); ctx.arc(-r * 0.18, r * 0.15, r * 0.1, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.18, r * 0.15, r * 0.1, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

// 🐦 绘制红鸟
function drawBird(ctx, body) {
  const { x, y } = body.position;
  const r = body.circleRadius;
  const angle = body.angle;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  ctx.fillStyle = '#e74c3c';
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = '#f8d7da';
  ctx.beginPath(); ctx.arc(0, r * 0.3, r * 0.6, 0, Math.PI); ctx.fill();

  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.moveTo(-r * 0.7, -r * 0.3);
  ctx.lineTo(0, -r * 0.1);
  ctx.lineTo(r * 0.7, -r * 0.3);
  ctx.lineTo(0, -r * 0.3);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-r * 0.25, -r * 0.05, r * 0.22, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.25, -r * 0.05, r * 0.22, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(-r * 0.15, -r * 0.05, r * 0.08, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.15, -r * 0.05, r * 0.08, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = '#f1c40f';
  ctx.beginPath();
  ctx.moveTo(-r * 0.3, r * 0.1);
  ctx.lineTo(r * 0.3, r * 0.1);
  ctx.lineTo(0, r * 0.55);
  ctx.closePath(); ctx.fill();

  ctx.restore();
}

// 更新 HUD
function updateHUD() {
  document.getElementById('level-num').innerText = currentLevel;
  document.getElementById('score').innerText = score;
  document.getElementById('birds-left').innerText = birdsLeft;
}

// 显示弹窗
function showModal(isVictory) {
  const modal = document.getElementById('modal');
  const title = document.getElementById('modal-title');
  const desc = document.getElementById('modal-desc');
  const btn = document.getElementById('modal-btn');

  if (isVictory) {
    title.innerText = currentLevel === 10 ? "🏆 恭喜大获全胜通关！" : "🎉 关卡完成！";
    title.className = "modal-title";
    desc.innerText = currentLevel === 10 ? `太强了！你通关了全部10个关卡！最终得分: ${score}` : `成功消灭所有绿猪，准备好挑战下一关了吗？`;
    btn.innerText = currentLevel === 10 ? "重新玩第 1 关" : "进入下一关";
  } else {
    title.innerText = "💥 挑战失败！";
    title.className = "modal-title fail";
    desc.innerText = "小鸟用光了，但还有绿猪存活。再试一次吧！";
    btn.innerText = "重试本关";
  }

  modal.classList.add('show');
}

// 弹窗点击响应
function handleModalClick() {
  const modal = document.getElementById('modal');
  modal.classList.remove('show');

  const pigsLeft = getRemainingPigsCount();

  if (pigsLeft === 0) {
    if (currentLevel < 10) {
      currentLevel++;
    } else {
      currentLevel = 1;
      score = 0;
    }
  }
  
  resetCurrentLevel();
}

// 重置关卡
function resetCurrentLevel() {
  initGame();
}

// ⌨️ PC 端键盘快捷键绑定
window.addEventListener('keydown', (e) => {
  // 按 R 键快捷重置关卡
  if (e.key === 'r' || e.key === 'R') {
    resetCurrentLevel();
  }
  // 按 Enter 或 Space 键关闭/响应弹窗
  if (e.key === 'Enter' || e.key === ' ') {
    const modal = document.getElementById('modal');
    if (modal.classList.contains('show')) {
      handleModalClick();
    }
  }
});

// 窗口尺寸改变/旋转屏幕时自动重置
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    resetCurrentLevel();
  }, 200);
});

window.onload = initGame;
</script>
