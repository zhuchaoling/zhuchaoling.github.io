<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>愤怒的小鸟 - 全平台自动适配版</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <style>
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      user-select: none; 
      -webkit-user-select: none; 
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1c23;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      touch-action: none;
    }

    /* 游戏外层舞台容器 */
    #app-stage {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 游戏核心区域 */
    #game-container {
      position: relative;
      background: #87CEEB;
      overflow: hidden;
    }

    /* 📱 当移动端处于竖屏时，自动强制旋转 90 度，实现无感横屏展示 */
    @media screen and (orientation: portrait) and (max-width: 768px) {
      #game-container.auto-rotate {
        width: 100vh !important;
        height: 100vw !important;
        transform: rotate(90deg);
        transform-origin: center center;
      }
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .hud {
      position: absolute;
      top: 12px; left: 16px;
      font-size: 16px; font-weight: 900;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      color: #ffd32a;
      pointer-events: none;
      z-index: 10;
      display: flex;
      gap: 20px;
    }
    .controls-tip {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      font-weight: normal;
      display: none;
    }
    @media (min-width: 769px) {
      .controls-tip { display: inline-block; }
    }

    .reset-btn {
      position: absolute;
      top: 10px; right: 16px;
      padding: 8px 18px;
      background: linear-gradient(45deg, #ff4757, #ff6b81);
      border: none; border-radius: 20px;
      color: #fff; font-weight: bold; font-size: 14px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(255,71,87,0.4);
      z-index: 10;
      transition: transform 0.1s ease, background 0.2s;
    }
    .reset-btn:active { transform: scale(0.92); }

    /* 弹窗 */
    .modal {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(4px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .modal.show { opacity: 1; pointer-events: auto; }
    .modal-card {
      background: #2f3542; border: 3px solid #ffa502;
      border-radius: 16px; padding: 24px 36px; text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transform: scale(0.8); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      max-width: 90%; width: 380px;
    }
    .modal.show .modal-card { transform: scale(1); }
    .modal-title { font-size: 24px; font-weight: 900; color: #2ed573; margin-bottom: 10px; }
    .modal-title.fail { color: #ff4757; }
    .modal-desc { font-size: 14px; color: #dfe4ea; margin-bottom: 20px; line-height: 1.5; }
    .modal-btn {
      padding: 10px 24px; font-size: 15px; font-weight: bold; color: #fff;
      background: #2ed573; border: none; border-radius: 25px; cursor: pointer;
      box-shadow: 0 4px 15px rgba(46, 213, 115, 0.4);
    }
    .modal-btn:active { transform: scale(0.95); }
  </style>
</head>
<body>

  <div id="app-stage">
    <div id="game-container" class="auto-rotate">
      <div class="hud">
        <div>关卡: <span id="level-num">1</span>/10</div>
        <div>得分: <span id="score">0</span></div>
        <div>剩余小鸟: <span id="birds-left">3</span></div>
        <div class="controls-tip">(快捷键: [R]重置 [Space]继续)</div>
      </div>
      <button class="reset-btn" onclick="resetCurrentLevel()">重置 (R)</button>

      <div id="modal" class="modal">
        <div class="modal-card">
          <div id="modal-title" class="modal-title">关卡完成！</div>
          <div id="modal-desc" class="modal-desc">成功歼灭了所有绿猪！</div>
          <button id="modal-btn" class="modal-btn" onclick="handleModalClick()">进入下一关</button>
        </div>
      </div>
    </div>
  </div>

<script>
const { Engine, Render, Runner, Bodies, Composite, Constraint, Mouse, MouseConstraint, Events, Vector } = Matter;

let width, height, slingPos;
let engine, render, runner, bird, slingshot, mouseConstraint;
let currentLevel = 1;
let score = 0;
let birdsLeft = 3;
let isFired = false;
let gameStartTime = 0;
let levelCleared = false;
let isRotated = false;

const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function calculateViewport() {
  const windowW = window.innerWidth;
  const windowH = window.innerHeight;

  // 判断是否需要强制 90 度旋转展示（仅移动端竖屏时）
  if (isMobile && windowH > windowW) {
    isRotated = true;
    width = windowH;  // 逻辑宽度使用高度
    height = windowW; // 逻辑高度使用宽度
  } else {
    isRotated = false;
    width = windowW;
    height = windowH;
  }

  const container = document.getElementById('game-container');
  container.style.width = width + 'px';
  container.style.height = height + 'px';

  slingPos = { 
    x: Math.max(120, width * 0.18), 
    y: Math.min(height - 120, height * 0.68) 
  };
}

function initGame() {
  calculateViewport();
  const container = document.getElementById('game-container');

  if (render) {
    Render.stop(render);
    Runner.stop(runner);
    Composite.clear(engine.world);
    Engine.clear(engine);
    if (render.canvas) render.canvas.remove();
  }

  gameStartTime = Date.now();
  isFired = false;
  levelCleared = false;
  birdsLeft = 3;
  updateHUD();

  engine = Engine.create();
  
  render = Render.create({
    element: container,
    engine: engine,
    options: {
      width: width,
      height: height,
      wireframes: false,
      background: '#87CEEB'
    }
  });

  Render.run(render);
  runner = Runner.create();
  Runner.run(runner, engine);

  // 边界设置
  const groundHeight = 30;
  const ground = Bodies.rectangle(width / 2, height - groundHeight / 2, width * 2, groundHeight, { 
    isStatic: true, render: { fillStyle: '#4bc02d' } 
  });
  const leftWall = Bodies.rectangle(-20, height / 2, 40, height * 4, { isStatic: true });
  const rightWall = Bodies.rectangle(width + 20, height / 2, 40, height * 4, { isStatic: true });
  Composite.add(engine.world, [ground, leftWall, rightWall]);

  loadLevel(currentLevel);
  spawnBird();

  // 触控/鼠标逻辑与坐标矫正
  const mouse = Mouse.create(render.canvas);

  // 如果处于 CSS 旋转状态，需重新映射 Touch 坐标到 物理世界坐标
  mouse.positionOffset = function() {
    return { x: 0, y: 0 };
  };

  if (isRotated) {
    const customGetMousePos = (e) => {
      const rect = render.canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;

      // 将竖屏屏幕坐标转换为 90 度旋转后的 Canvas 局部逻辑坐标
      return {
        x: (clientY - rect.top) * (width / rect.height),
        y: (rect.right - clientX) * (height / rect.width)
      };
    };

    // 重写 Matter.js 的 mouse position 捕获算法
    mouse.element.removeEventListener("mousemove", mouse.mousemove);
    mouse.element.removeEventListener("touchmove", mouse.touchmove);

    const updateMousePos = (e) => {
      const pos = customGetMousePos(e);
      mouse.position.x = pos.x;
      mouse.position.y = pos.y;
    };

    mouse.element.addEventListener("touchmove", updateMousePos, { passive: true });
    mouse.element.addEventListener("touchstart", updateMousePos, { passive: true });
    mouse.element.addEventListener("mousemove", updateMousePos);
  }

  mouseConstraint = MouseConstraint.create(engine, {
    mouse: mouse,
    constraint: { stiffness: 0.2, render: { visible: false } }
  });
  Composite.add(engine.world, mouseConstraint);
  render.mouse = mouse;

  Events.on(mouseConstraint, 'enddrag', (e) => {
    if (e.body === bird) isFired = true;
  });

  Events.on(engine, 'afterUpdate', () => {
    if (isFired && bird && bird.position.x > slingPos.x + 10) {
      slingshot.bodyB = null;
      slingshot.render.visible = false;
    }

    if (isFired && bird) {
      const isSlow = Vector.magnitude(bird.velocity) < 0.25;
      const isOutOfBounds = bird.position.x > width + 100 || bird.position.x < -100 || bird.position.y > height + 100;

      if (isSlow || isOutOfBounds) {
        Composite.remove(engine.world, bird);
        bird = null;
        birdsLeft--;
        updateHUD();

        if (birdsLeft > 0 && !levelCleared && getRemainingPigsCount() > 0) {
          setTimeout(() => { spawnBird(); }, 400);
        } else {
          checkGameStatus();
        }
      }
    }
  });

  Events.on(engine, 'collisionStart', (event) => {
    if (Date.now() - gameStartTime < 800) return;
    event.pairs.forEach((pair) => {
      const { bodyA, bodyB } = pair;
      const checkPigHit = (target) => {
        if (target.label === 'pig') {
          const speed = Vector.magnitude(Vector.sub(bodyA.velocity, bodyB.velocity));
          if (speed > 2.5) {
            Composite.remove(engine.world, target);
            score += 200;
            updateHUD();
            setTimeout(checkGameStatus, 200);
          }
        }
      };
      checkPigHit(bodyA);
      checkPigHit(bodyB);
    });
  });

  Events.on(render, 'afterRender', () => {
    const ctx = render.context;
    if (!isFired && bird && mouseConstraint.body === bird) {
      drawTrajectory(ctx);
    }
    const bodies = Composite.allBodies(engine.world);
    bodies.forEach(body => {
      if (body.label === 'pig') drawPig(ctx, body);
      else if (body.label === 'bird') drawBird(ctx, body);
    });
  });
}

function spawnBird() {
  const birdRadius = Math.max(12, Math.min(18, width * 0.015));
  bird = Bodies.circle(slingPos.x, slingPos.y, birdRadius, {
    density: 0.004, frictionAir: 0.005, label: 'bird', render: { visible: false }
  });

  slingshot = Constraint.create({
    pointA: slingPos, bodyB: bird, stiffness: 0.05, damping: 0.01,
    render: { strokeStyle: '#5d4037', lineWidth: 6 }
  });

  Composite.add(engine.world, [bird, slingshot]);
  isFired = false;
}

function getRemainingPigsCount() {
  return Composite.allBodies(engine.world).filter(b => b.label === 'pig').length;
}

function checkGameStatus() {
  if (levelCleared) return;
  if (getRemainingPigsCount() === 0) {
    levelCleared = true;
    showModal(true);
  } else if (birdsLeft === 0 && (!bird || isFired)) {
    showModal(false);
  }
}

function loadLevel(level) {
  const wood = '#a67c52', stone = '#7f8c8d';
  const createWood = (x, y, w, h) => Bodies.rectangle(x, y, w, h, { label: 'wood', render: { fillStyle: wood } });
  const createStone = (x, y, w, h) => Bodies.rectangle(x, y, w, h, { label: 'stone', render: { fillStyle: stone } });
  const defaultPigR = Math.max(12, Math.min(16, width * 0.014));
  const createPig = (x, y, r = defaultPigR) => Bodies.circle(x, y, r, { label: 'pig', render: { visible: false } });

  const items = [];
  const baseX = Math.max(width * 0.65, width - 350);
  const baseY = height - 30;

  if (level === 1) {
    items.push(createWood(baseX - 40, baseY - 35, 16, 70), createWood(baseX + 40, baseY - 35, 16, 70));
    items.push(createWood(baseX, baseY - 75, 110, 14));
    items.push(createPig(baseX, baseY - 20), createPig(baseX, baseY - 95));
  } else {
    // 关卡 2-10 保持结构自适应
    items.push(createStone(baseX - 60, baseY - 45, 20, 90), createStone(baseX + 60, baseY - 45, 20, 90));
    items.push(createWood(baseX, baseY - 95, 150, 16));
    items.push(createPig(baseX - 30, baseY - 20), createPig(baseX + 30, baseY - 20));
    items.push(createWood(baseX - 30, baseY - 135, 16, 60), createWood(baseX + 30, baseY - 135, 16, 60));
    items.push(createWood(baseX, baseY - 170, 90, 14));
    items.push(createPig(baseX, baseY - 190));
  }

  Composite.add(engine.world, items);
}

function drawTrajectory(ctx) {
  const forceX = (slingPos.x - bird.position.x) * 0.13;
  const forceY = (slingPos.y - bird.position.y) * 0.13;
  let vx = (forceX / bird.density) * 0.0004; 
  let vy = (forceY / bird.density) * 0.0004;
  let currX = bird.position.x, currY = bird.position.y;
  const gravity = engine.world.gravity.y * engine.world.gravity.scale;

  ctx.save();
  ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
  for (let i = 0; i < 28; i++) {
    currX += vx; currY += vy; vy += gravity * 16;
    if (i % 2 === 0) {
      ctx.beginPath();
      ctx.arc(currX, currY, Math.max(1.5, 4 - i * 0.1), 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();
}

function drawPig(ctx, body) {
  const { x, y } = body.position;
  const r = body.circleRadius;
  ctx.save(); ctx.translate(x, y); ctx.rotate(body.angle);
  ctx.fillStyle = '#27ae60';
  ctx.beginPath(); ctx.arc(-r * 0.7, -r * 0.7, r * 0.35, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.7, -r * 0.7, r * 0.35, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#2ecc71'; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-r * 0.35, -r * 0.2, r * 0.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.35, -r * 0.2, r * 0.3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(-r * 0.3, -r * 0.2, r * 0.12, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.4, -r * 0.2, r * 0.12, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#27ae60'; ctx.beginPath(); ctx.ellipse(0, r * 0.15, r * 0.45, r * 0.3, 0, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawBird(ctx, body) {
  const { x, y } = body.position;
  const r = body.circleRadius;
  ctx.save(); ctx.translate(x, y); ctx.rotate(body.angle);
  ctx.fillStyle = '#e74c3c'; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#f8d7da'; ctx.beginPath(); ctx.arc(0, r * 0.3, r * 0.6, 0, Math.PI); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-r * 0.25, -r * 0.05, r * 0.22, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.25, -r * 0.05, r * 0.22, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(-r * 0.15, -r * 0.05, r * 0.08, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.15, -r * 0.05, r * 0.08, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#f1c40f'; ctx.beginPath();
  ctx.moveTo(-r * 0.3, r * 0.1); ctx.lineTo(r * 0.3, r * 0.1); ctx.lineTo(0, r * 0.55); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function updateHUD() {
  document.getElementById('level-num').innerText = currentLevel;
  document.getElementById('score').innerText = score;
  document.getElementById('birds-left').innerText = birdsLeft;
}

function showModal(isVictory) {
  const modal = document.getElementById('modal');
  const title = document.getElementById('modal-title');
  const desc = document.getElementById('modal-desc');
  const btn = document.getElementById('modal-btn');

  if (isVictory) {
    title.innerText = currentLevel === 10 ? "🏆 大获全胜！" : "🎉 关卡完成！";
    title.className = "modal-title";
    desc.innerText = currentLevel === 10 ? `最终得分: ${score}` : `成功消灭所有绿猪！`;
    btn.innerText = currentLevel === 10 ? "重玩第 1 关" : "下一关";
  } else {
    title.innerText = "💥 挑战失败！";
    title.className = "modal-title fail";
    desc.innerText = "小鸟用光了，再试一次吧！";
    btn.innerText = "重试本关";
  }
  modal.classList.add('show');
}

function handleModalClick() {
  document.getElementById('modal').classList.remove('show');
  if (getRemainingPigsCount() === 0) {
    currentLevel = currentLevel < 10 ? currentLevel + 1 : 1;
  }
  resetCurrentLevel();
}

function resetCurrentLevel() { initGame(); }

window.addEventListener('keydown', (e) => {
  if (e.key === 'r' || e.key === 'R') resetCurrentLevel();
  if (e.key === 'Enter' || e.key === ' ') {
    if (document.getElementById('modal').classList.contains('show')) handleModalClick();
  }
});

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(resetCurrentLevel, 200);
});

window.onload = initGame;
</script>
</body>
</html>
